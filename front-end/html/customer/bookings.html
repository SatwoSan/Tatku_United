<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Bookings – Tatku United</title>
    <link rel="stylesheet" href="../../css/customer/bookings.css" />
    <link rel="stylesheet" href="../../css/customer_notifications.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar">
      <a href="home.html" class="nav-brand">
        <div class="brand-logo">TU</div>
        <span class="brand-name">Tatku United</span>
      </a>
      <div class="nav-links">
        <a href="home.html" class="nav-link">Home</a>
        <a href="../service_pages/service_discovery.html" class="nav-link">Services</a>
        <a href="bookings.html" class="nav-link active">Bookings</a>
      </div>
      <div class="nav-right">
        <a href="cart.html" class="cart-btn">
          <svg viewBox="0 0 24 24">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <path d="M16 10a4 4 0 01-8 0" />
          </svg>
          <span class="cart-count" id="cart-count">0</span>
        </a>
        <a href="profile.html" class="user-avatar-btn" title="My Profile">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </a>
      </div>
    </nav>

    <main class="main">
      <div class="page-header">
        <div>
          <h1 class="page-title">My Bookings</h1>
          <p class="page-sub">Manage and track your scheduled home services</p>
        </div>
        <a href="../service_pages/service_discovery.html" class="btn-new-booking">
          <svg viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          New Booking
        </a>
      </div>

      <div class="filters-bar">
        <div class="filter-tabs" id="filter-tabs"></div>
        <div class="filter-right" style="display:flex;align-items:center;gap:12px;">
          <div style="display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:4px 8px;">
            <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:var(--text-2);fill:none;stroke-width:2;"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            <input type="date" id="filter-start" style="border:none;outline:none;font-family:inherit;font-size:13px;color:var(--text-1);background:transparent;cursor:pointer;" title="Start Date" onchange="renderBookings()">
            <span style="color:var(--text-3);font-size:12px;font-weight:500;">to</span>
            <input type="date" id="filter-end" style="border:none;outline:none;font-family:inherit;font-size:13px;color:var(--text-1);background:transparent;cursor:pointer;" title="End Date" onchange="renderBookings()">
          </div>
          <button class="filter-btn" id="sort-btn" onclick="toggleSort()">
            <svg viewBox="0 0 24 24">
              <line x1="4" y1="6" x2="20" y2="6" id="sort-icon-1"/>
              <line x1="4" y1="12" x2="20" y2="12" id="sort-icon-2"/>
              <line x1="4" y1="18" x2="14" y2="18" id="sort-icon-3"/>
            </svg>
            <span id="sort-label" style="display:inline-block; min-width:85px; text-align:left;">Sort: Newest</span>
          </button>
        </div>
      </div>

      <div class="bookings-list" id="bookings-list"></div>
      <div class="pagination" id="pagination"></div>
    </main>

    <footer class="footer">
      <span>© 2026 Tatku United Inc. All rights reserved.</span>
      <div class="footer-links">
        <a href="../legal/terms-of-service.html">Terms of Service</a>
        <a href="../legal/privacy-policy.html">Privacy Policy</a>
        <a href="home.html">Contact Support</a>
      </div>
    </footer>

    <!-- BOOKING DETAIL DRAWER -->
    <div
      class="drawer-overlay"
      id="drawer-overlay"
      onclick="closeDrawer(event)"
    >
      <div class="drawer" id="drawer">
        <button class="drawer-close" onclick="closeDrawerBtn()">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
        <div id="drawer-content"></div>
      </div>
    </div>

    <!-- RESCHEDULE MODAL -->
    <div class="modal-overlay" id="reschedule-modal" onclick="closeRescheduleModal(event)">
      <div class="modal">
        <button class="modal-close" onclick="closeRescheduleModalBtn()">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
        <div class="modal-header">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <path d="M16 2v4M8 2v4M3 10h18" />
          </svg>
          <h2 class="modal-title">Reschedule Booking</h2>
        </div>
        <p class="modal-service-name" id="reschedule-service-name"></p>
        <p class="modal-hint" id="reschedule-hint">Select a new date within 1 week from today</p>
        <div class="modal-fields">
          <div class="form-field">
            <label>New Date</label>
            <input type="date" id="reschedule-date" />
          </div>
          <div class="form-field">
            <label>New Time</label>
            <input type="time" id="reschedule-time" />
          </div>
        </div>
        <div class="modal-footer">
          <button class="modal-btn-cancel" onclick="closeRescheduleModalBtn()">Cancel</button>
          <button class="modal-btn-save" onclick="saveReschedule()">Reschedule</button>
        </div>
      </div>
    </div>

    <script src="../../js/data/store.js"></script>
    <script src="../../js/modules/auth.js"></script>
    <script src="../../js/utils/api.js"></script>
    <script src="../../js/modules/crud.js"></script>
    <script src="../../js/utils/validation.js"></script>
    <script src="../../js/utils/helpers.js"></script>
    <script src="../../js/modules/assignmentEngine.js"></script>
    <script src="../../js/customer/bookings.js"></script>
  </body>
</html>
