<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home – Tatku United</title>
    <link rel="stylesheet" href="../../css/customer/home.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar">
      <a href="home.html" class="nav-brand">
        <div class="brand-logo">TU</div>
        <span class="brand-name">Tatku United</span>
      </a>
      <div class="nav-links">
        <a href="home.html" class="nav-link active">Home</a>
        <a href="../service_pages/service_discovery.html" class="nav-link">Services</a>
        <a href="bookings.html" class="nav-link">Bookings</a>
      </div>
      <div class="nav-right">
        <a href="cart.html" class="cart-btn">
          <svg viewBox="0 0 24 24">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <path d="M16 10a4 4 0 01-8 0" />
          </svg>
          <span class="cart-count" id="cart-count">0</span>
        </a>
        <a href="profile.html" class="user-avatar-btn" title="My Profile">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </a>
      </div>
    </nav>

    <main class="main">
      <section class="hero">
        <div class="hero-content">
          <h1 class="hero-title">
            Welcome back, <span class="hero-name">Shri Charan!</span>
          </h1>
          <p class="hero-sub">
            Your home is in good hands. Need something done today?
          </p>
          <a href="../service_pages/service_discovery.html" class="hero-cta">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="16" />
              <line x1="8" y1="12" x2="16" y2="12" />
            </svg>
            Book a Service
          </a>
        </div>
      </section>


      <section class="section">
        <div class="section-header">
          <h2 class="section-title">
            <svg viewBox="0 0 24 24" class="section-icon">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <path d="M16 2v4M8 2v4M3 10h18" />
            </svg>
            My Recent Bookings
          </h2>
          <a href="bookings.html" class="view-all btn-outline">View History</a>
        </div>
        <div class="bookings-grid" id="bookings-grid"></div>
      </section>
    </main>

    <script src="../../js/data/store.js"></script>
    <script src="../../js/modules/auth.js"></script>
    <script src="../../js/utils/api.js"></script>
    <script src="../../js/modules/crud.js"></script>
    <script src="../../js/utils/validation.js"></script>
    <script src="../../js/utils/helpers.js"></script>
    <script src="../../js/modules/assignmentEngine.js"></script>
    <script src="../../js/customer/home.js"></script>
  </body>
</html>
