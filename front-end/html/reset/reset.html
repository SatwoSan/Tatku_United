<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Database - Tatku United</title>
</head>
<body style="font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f9f9f9;">
    
    <h2>Tatku United - Dev Tools</h2>
    <p style="text-align: center; max-width: 400px; color: #555;">
        Click the button below to clear locally cached app data and auth session keys.
        Use this when you want a clean browser state for testing.
    </p>

    <button id="reset-btn" style="padding: 12px 24px; background-color: #e74c3c; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 20px;">
        Wipe Database & Reset
    </button>
    <p id="status-msg" style="color: green; font-weight: bold; margin-top: 15px; display: none;">
        Data wiped successfully! Redirecting to login...
    </p>

    <!-- Point to the JS reset script -->
    <script src="../../js/reset/reset.js"></script>
</body>
</html>
