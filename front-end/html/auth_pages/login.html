<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Tatku United</title>
    <link rel="stylesheet" href="../../css/auth_pages/login.css" />
  </head>

  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <!-- Header -->
        <div class="login-header">
          <!-- <div class="login-logo">🔧</div> -->
          <h1 class="login-title">Tatku United</h1>
          <p class="login-subtitle">Sign in to your account</p>
        </div>

        <!-- Form -->
        <form id="login-form" novalidate>

          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input
              class="form-input"
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="input-password-wrap">
              <input
                class="form-input"
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
              <button
                type="button"
                id="toggle-password"
                class="toggle-password"
                aria-label="Toggle password visibility"
              >
                <span id="toggle-icon">👁</span>
              </button>
            </div>
          </div>

          <p
            id="login-error"
            class="login-error"
            role="alert"
            aria-live="polite"
          ></p>

          <button type="submit" class="btn-login" id="btn-login">
            Sign In
          </button>

          <p class="register-hint">
            Don't have an account?
            <a href="register.html" class="register-link">Register here</a>.
          </p>
        </form>
      </div>
      <!-- /.login-card -->
    </div>
    <!-- /.login-wrapper -->

    <!-- Script load order per spec -->
    <script src="../../js/data/store.js"></script>
    <script src="../../js/modules/auth.js"></script>
    <script src="../../js/utils/api.js"></script>
    <script src="../../js/utils/helpers.js"></script>
    <script src="../../js/utils/validation.js"></script>
    <script src="../../js/auth_pages/login.js"></script>
  </body>
</html>
