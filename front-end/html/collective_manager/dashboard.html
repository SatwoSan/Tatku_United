<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collective Manager – Dashboard</title>
  <link rel="stylesheet" href="../../css/collective_manager/dashboard.css" />
  <link rel="stylesheet" href="../../css/modules/global_search.css" />
</head>

<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">TU</div>
      <span class="brand-name">Collective Manager</span>
    </div>
    <nav class="nav">
      <a href="dashboard.html" class="nav-item active">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
        Dashboard
      </a>
      <a href="revenue_reports.html" class="nav-item">
        <svg viewBox="0 0 24 24">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
        </svg>
        Revenue Reports
      </a>
      <a href="admit_providers.html" class="nav-item">
        <svg viewBox="0 0 24 24">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <line x1="19" y1="8" x2="19" y2="14" />
          <line x1="22" y1="11" x2="16" y2="11" />
        </svg>
        Manage Service Providers
      </a>
      <a href="manage_units.html" class="nav-item">
        <svg viewBox="0 0 24 24">
          <path
            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
        </svg>
        Manage Units
      </a>
      <a href="profile.html" class="nav-item">
        <svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        My Profile
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="../auth_pages/logout.html" class="logout-link" id="logout-btn"
        >
        <svg viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Logout
      </a>
    </div>
  </aside>

  <div class="layout">
    <header class="topbar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" class="search-input" placeholder="Search reports, transactions, or providers..." />
      </div>
      <div class="topbar-right">
        <a href="profile.html" class="avatar" title="My Profile" id="topbar-avatar">CM</a>
      </div>
    </header>

    <main class="main">
      <h1 class="page-title" id="page-greeting">Dashboard Overview</h1>

      <!-- ── Collective Overview Banner ── -->
      <div id="collective-banner" class="collective-banner">
        <div class="banner-row">
          <div>
            <span class="banner-label">Your Collective</span>
            <h2 id="collective-name" class="banner-title">—</h2>
          </div>
          <div class="banner-meta-row">
            <span id="collective-status-badge" class="banner-status">—</span>
            <span class="banner-item">🗺️ Sectors: <strong id="collective-sectors">—</strong></span>
            <span class="banner-item">📦 Units: <strong id="collective-units">—</strong></span>
            <span class="banner-item">👤 Manager: <strong id="collective-manager-name">—</strong></span>
          </div>
        </div>
      </div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-info">
            <span class="stat-label">Total Providers</span>
            <span class="stat-value" id="stat-providers">—</span>
          </div>
          <div class="stat-icon icon-blue">
            <svg viewBox="0 0 24 24">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-info">
            <span class="stat-label">Active Units</span>
            <span class="stat-value" id="stat-active-units">—</span>
          </div>
          <div class="stat-icon icon-teal">
            <svg viewBox="0 0 24 24">
              <path
                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
            </svg>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-info">
            <span class="stat-label">Revenue (All Time)</span>
            <span class="stat-value" id="stat-revenue">—</span>
          </div>
          <div class="stat-icon icon-green">
            <svg viewBox="0 0 24 24">
              <line x1="12" y1="1" x2="12" y2="23" />
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
            </svg>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-info">
            <span class="stat-label">Completed Services</span>
            <span class="stat-value" id="stat-completed">—</span>
          </div>
          <div class="stat-icon icon-indigo">
            <svg viewBox="0 0 24 24">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
          </div>
        </div>
      </div>


    </main>
  </div>
  <script src="../../js/data/store.js"></script>
  <script src="../../js/modules/auth.js"></script>
    <script src="../../js/utils/api.js"></script>
  <script src="../../js/modules/global_search.js"></script>
  <script src="../../js/collective_manager/dashboard.js"></script>
</body>

</html>
